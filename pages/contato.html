<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - EcoUrbe</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="../index.html" class="logo">EcoUrbe</a>
            <ul class="nav-menu">
                <li><a href="../index.html">Início</a></li>
                <li><a href="sobre.html">Sobre a ODS</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-section">
        <h2>Envie sua Ideia de Sustentabilidade</h2>
        <form id="formContato" class="form-contato">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="mensagem">Como seu bairro pode melhorar?</label>
                <textarea id="mensagem" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Enviar Proposta</button>
        </form>
    </main>
<script src="../scripts/main.js"></script>
</body>
</html>
